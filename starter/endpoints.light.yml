# Lighter Nebius models — use when the default 235B model is slow or hits token limits.
# Verified model id on Token Factory: google/gemma-3-27b-it (NOT ...-fast — that id 404s).
# Start Rasa with:
#   python -m rasa run --enable-api --cors "*" --endpoints endpoints.light.yml --sub-agents agentic/sub_agents

action_endpoint:
  actions_module: "actions"

model_groups:
  - id: nebius_command_llm
    models:
      - provider: self-hosted
        model: google/gemma-3-27b-it
        api_base: "https://api.tokenfactory.nebius.com/v1"
        api_key: ${NEBIUS_API_KEY}
        temperature: 0.0
        max_tokens: 2048
        timeout: 45

  - id: nebius_agent_llm
    models:
      - provider: self-hosted
        model: google/gemma-3-27b-it
        api_base: "https://api.tokenfactory.nebius.com/v1"
        api_key: ${NEBIUS_API_KEY}
        temperature: 0.3
        max_tokens: 2048
        timeout: 60

# No NLG rephrase — Gemma paraphrase adds meta-commentary unsuitable for demos.

mcp_servers:
  - name: ops_tools
    url: http://localhost:8000/mcp
    type: http

interaction_handling:
  global_silence_timeout: 7
