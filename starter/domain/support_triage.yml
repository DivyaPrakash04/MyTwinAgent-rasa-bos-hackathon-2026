version: "3.1"

actions:
  - action_create_ticket
  - action_greet_twin

slots:
  issue_summary:
    type: text
    mappings:
      - type: from_llm
  issue_category:
    type: categorical
    values:
      - compliance
      - prior_auth
      - inventory
      - temperature
    mappings:
      - type: from_llm
  issue_priority:
    type: categorical
    values:
      - low
      - medium
      - high
      - urgent
    mappings:
      - type: from_llm
  contact_email:
    type: text
    mappings:
      - type: from_llm
  
  # Session Persistence Slots (controlled by actions, not filled by LLM)
  ticket_id:
    type: text
    mappings:
      - type: controlled
  has_active_incident:
    type: bool
    mappings:
      - type: controlled
  last_incident_id:
    type: text
    mappings:
      - type: controlled
  last_incident_summary:
    type: text
    mappings:
      - type: controlled
  user_name:
    type: text
    mappings:
      - type: from_llm

responses:
  utter_ask_user_name:
    - text: "Hey! I am active and ready. What is your name?"
  utter_ask_issue_summary:
    - text: "I can log that compliance ticket for you. What is the active exception or issue in the lab?"
  utter_ask_issue_category:
    - text: "Got it. Is this general compliance, a prior-auth issue, inventory discrepancy, or refrigerator temperature excursion?"
  utter_ask_issue_priority:
    - text: "Understood. How urgent is this clinical exception — low, medium, high, or urgent?"
  utter_ask_contact_email:
    - text: "What's the best email address to send compliance notifications to?"
  utter_ticket_created:
    - text: "Done — I've logged incident {ticket_id} as a {issue_priority}-priority {issue_category} exception. Shift updates will go to {contact_email}."
  utter_welcome_back_with_incident:
    - text: "Welcome back, Pharmacist {user_name}! I see we have an active Fridge B temperature excursion (incident {last_incident_id}: {last_incident_summary}). Shall we resume following up on the Shingrix quarantine steps?"
  utter_welcome_clean_shift:
    - text: "Hi Pharmacist {user_name}! All sensors are green. Ready to co-pilot. How is your shift starting?"
