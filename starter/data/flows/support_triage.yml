flows:
  log_support_ticket:
    description: >
      Log a new compliance exception, refrigerator temperature excursion, stock drop, or inventory discrepancy for the pharmacist.
      Triggers when the user reports an alarm, a problem, or wants to open, raise, or create a compliance incident or ticket in the pharmacy.
    steps:
      - collect: issue_summary
        description: A short description of the exception or problem (e.g., Fridge B temperature drop).
      - collect: issue_category
        description: "The kind of clinical issue: compliance, prior_auth, inventory, or temperature."
      - collect: issue_priority
        description: "How urgent the incident is: low, medium, high, or urgent."
      - collect: contact_email
        description: The pharmacist's email address where ticket updates should be sent.
      - action: action_create_ticket
      - action: utter_ticket_created
        next: END
