# Deterministic demo config — fixed template responses (no LLM rephrase), reliable Qwen brain.
# Use with: python -m rasa run --enable-api --cors "*" --endpoints endpoints.demo.yml --sub-agents agentic/sub_agents

action_endpoint:
  actions_module: "actions"

model_groups:
  - id: nebius_command_llm
    models:
      - provider: self-hosted
        model: Qwen/Qwen3-235B-A22B-Instruct-2507
        api_base: "https://api.tokenfactory.nebius.com/v1"
        api_key: ${NEBIUS_API_KEY}
        temperature: 0.0
        max_tokens: 512
        timeout: 45

  - id: nebius_agent_llm
    models:
      - provider: self-hosted
        model: Qwen/Qwen3-235B-A22B-Instruct-2507
        api_base: "https://api.tokenfactory.nebius.com/v1"
        api_key: ${NEBIUS_API_KEY}
        temperature: 0.0
        max_tokens: 512
        timeout: 60

# No `nlg: rephrase` block — responses use domain templates verbatim (no LLM paraphrase junk).

mcp_servers:
  - name: ops_tools
    url: http://localhost:8000/mcp
    type: http

interaction_handling:
  global_silence_timeout: 7
